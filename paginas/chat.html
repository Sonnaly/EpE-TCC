<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div id="form">
            <h2>Comentarios</h2>
            <form class="formulario" onsubmit="salvarComentario(event)">
                <div class="field">
                    <label for="nome">Seu Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome*" required>
                </div>
                <div class="field">
                    <label for="mensagem">Sua mensagem:</label>
                    <textarea name="mensagem" id="mensagem" placeholder="Mensagem*" required></textarea>
                </div>
                <button type="submit" class="btn btn-success" name="enviar">Enviar</button>
            </form>
            <div id="lista-comentarios" class="mt-4"></div>

        </div>
    </div>
    <script>

function salvarComentario(event){

event.preventDefault()

const nome = document.getElementById("nome").value
const mensagem = document.getElementById("mensagem").value

let comentarios = JSON.parse(localStorage.getItem("comentarios")) || []

comentarios.push({
nome: nome,
mensagem: mensagem,
data: new Date().toLocaleString()
})

localStorage.setItem("comentarios", JSON.stringify(comentarios))

mostrarComentarios()

document.getElementById("nome").value = ""
document.getElementById("mensagem").value = ""

}

function mostrarComentarios(){

let comentarios = JSON.parse(localStorage.getItem("comentarios")) || []

const area = document.querySelector("#data-table tbody")

area.innerHTML = ""

comentarios.reverse().forEach(c => {

area.innerHTML += `
<div class="card mb-3 shadow-sm">
<div class="card-body">
<h5 class="card-title">${c.nome}</h5>
<p class="card-text">${c.mensagem}</p>
<small class="text-muted">${c.data}</small>
</div>
</div>
`

})

}

mostrarComentarios()

</script>
</body>

</html>

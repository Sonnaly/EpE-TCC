<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>

    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"
        integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"
        integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <div id="form">
            <h2>Comentarios</h2>
            <form class="formulario" onsubmit="salvarComentario(event)">
                <div class="field">
                    <label for="nome">Seu Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome*" required>
                </div>
                <div class="field">
                    <label for="mensagem">Sua mensagem:</label>
                    <textarea name="mensagem" id="mensagem" placeholder="Mensagem*" required></textarea>
                </div>
                <button type="submit" class="btn btn-success" name="enviar">Enviar</button>
                <div id="lista-comentarios" class="mt-4"></div>
            </form>
            <div id="lista-comentarios" class="mt-4"></div>

        </div>
    </div>
<script src="/socket.io/socket.io.js"></script>

<script>
    // Variáveis Globais
    let socket = null;
    const form = document.querySelector(".formulario");
    const area = document.getElementById("lista-comentarios");

    // 1. Tentar inicializar o Socket.io apenas se a biblioteca carregar
    if (typeof io !== 'undefined') {
        try {
            socket = io();
            console.log("Conectado ao servidor de tempo real.");
            
            socket.on("receivedMessage", data => {
                adicionarMensagemNaTela(data);
                salvarNoLocalStorage(data); 
            });
        } catch (e) {
            console.warn("Servidor Socket.io não encontrado. Rodando em modo local.");
        }
    } else {
        console.log("Modo Offline: Usando apenas LocalStorage.");
    }

    // 2. Carregar comentários salvos ao abrir a página
    document.addEventListener("DOMContentLoaded", mostrarComentarios);

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const nome = document.getElementById("nome").value;
        const mensagem = document.getElementById("mensagem").value;
        const hora = new Date().toLocaleString();

        const data = { nome, mensagem, hora };

        // Salva localmente (Sempre funciona)
        salvarNoLocalStorage(data);
        adicionarMensagemNaTela(data);

        // Envia para o servidor APENAS se o socket estiver ativo
        if (socket && socket.connected) {
            socket.emit("sendMessage", data);
        }

        // Limpa os campos
        document.getElementById("mensagem").value = "";
    });

    function salvarNoLocalStorage(dado) {
        let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [];
        // Evita duplicados simples comparando mensagem e hora
        const jaExiste = comentarios.find(c => c.mensagem === dado.mensagem && c.hora === dado.hora);
        if (!jaExiste) {
            comentarios.push(dado);
            localStorage.setItem("comentarios", JSON.stringify(comentarios));
        }
    }

    function mostrarComentarios() {
        let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [];
        area.innerHTML = ""; 
        comentarios.forEach(c => adicionarMensagemNaTela(c));
    }

  function adicionarMensagemNaTela(data) {
    const idUnico = data.id || Date.now(); 
    const novoCard = `
        <div class="card shadow-sm" id="card-${idUnico}">
            <button onclick="deletarComentario(${idUnico})" class="btn-delete">&times;</button>
            <div class="card-body">
                <div class="conteudo-texto">
                    <strong style="color: #6f42c1;">${data.nome}</strong>
                    <span>${data.mensagem}</span>
                    <small class="text-muted" style="font-size: 0.7rem;">${data.hora}</small>
                </div>
            </div>
        </div>
    `;
    area.innerHTML += novoCard;
}
</script>

</body>


</html>
